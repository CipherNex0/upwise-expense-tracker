<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Log In</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
        <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    </head>
    <body>
        <div class="container">
            <div class="signup-image login-image">
                <a href="{{ url_for('home') }}">Upwise.</a>
                <h2> Welcome <span class="highlight">Back.</span></h2>
                <p>Continue your financial journey.</p>
            </div>

            <div class="right-form">
                <h2>Log In</h2>
                <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
                <form method="POST" id="form">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="John Doe" required>

                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter your password..." required>

                    <button type="submit">Log In</button>
                </form>
            </div>
        </div>
        <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    </body>
</html>
