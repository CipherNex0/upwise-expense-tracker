<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sign Up</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
        <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    </head>
    <body>
        <div class="container">
            <div class="signup-image">
                <a href="{{ url_for('home') }}">Upwise.</a>
                <h2>Spend smart, save <span class="highlight">more.</span></h2>
                <p>Your finances, simplified.</p>
            </div>

            <div class="right-form">
                <h2>Sign Up</h2>
                <p>Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
                <form method="POST" id="form">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="John Doe" required>

                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter your password..." required>

                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" required>

                    <p class="error-msg" id="passwordMismatch">Passwords do not match!</p>

                    <button type="submit">Sign Up</button>
                </form>
            </div>
        </div>
        <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    </body>
</html>
